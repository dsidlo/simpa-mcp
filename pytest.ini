[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = function
testpaths = tests
markers =
    integration: marks tests that require external services (TestContainers, PostgreSQL)
    unit: marks tests that don't require external services
    docker: marks tests that require Docker (docker-compose, container builds)
    slow: marks tests that take longer than 30 seconds
    db: marks tests that require database schema setup